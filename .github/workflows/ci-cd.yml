name: CI / CD

# CI runs on every push to main and on pull requests targeting main.
# Deploy runs only on push to main, and only after both CI jobs pass.
# Docs and diagnostic/benchmark workflow edits are excluded on push: a
# README-only merge once redeployed the stack and SIGKILLed the backend
# 3 minutes into a user's live solver run.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/workflows/agent-arena.yml"
      - ".github/workflows/backend-logs.yml"
  pull_request:
    branches: [main]

# Never allow two deploys to the server to overlap. A newer push waits for the
# running deploy to finish instead of cancelling it (safer for build+restart).
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Backend: FastAPI unit/integration tests (pytest). The slow solver benchmark
  # (~7 min) is excluded from CI via --ignore.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests (benchmark excluded)
        working-directory: backend
        run: python -m pytest tests -q --ignore=tests/test_solver_benchmark.py

  # ---------------------------------------------------------------------------
  # Frontend: TypeScript typecheck + Vitest. Playwright E2E is NOT run here
  # (it needs a running app).
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

  # ---------------------------------------------------------------------------
  # Deploy: SSH into the Hetzner server, fast-forward the repo and rebuild the
  # Docker stack, then health-check the backend. Only on push to main, only if
  # both CI jobs are green.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (SSH -> Hetzner)
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key and known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy (git pull + docker compose up)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          # Production runs the domain/Caddy stack (docker-compose.yml). Override
          # with a repo variable COMPOSE_FILE if the server ever switches stacks.
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'docker-compose.yml' }}
        run: |
          ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
              -i ~/.ssh/id_deploy -p "$SSH_PORT" \
              "$SSH_USER@$SSH_HOST" bash -s <<EOF
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git pull --ff-only
          # Never replace the container mid-solve: hold the deploy (up to
          # 90 min — runs have no wall-clock limit, only the iteration
          # budget) while a solver subprocess (multiprocessing spawn_main)
          # is alive in the backend container. Works regardless of the
          # deployed app version; a container that is down passes through.
          for i in \$(seq 1 540); do
            if docker compose -f "$COMPOSE_FILE" exec -T backend \
                 python -c "import glob;print(sum('spawn_main' in open(f,'rb').read().decode('utf-8','ignore') for f in glob.glob('/proc/[0-9]*/cmdline')))" 2>/dev/null \
               | grep -q '^[1-9]'; then
              echo "Solver run in flight - postponing deploy (\$i/540)..."
              sleep 10
            else
              break
            fi
          done
          docker compose -f "$COMPOSE_FILE" up -d --build
          # The Caddyfile is bind-mounted as a single file, and git pull
          # replaces it with a NEW inode — the running container (and even
          # 'caddy reload' inside it) keeps seeing the stale pre-pull content.
          # Only recreating the container re-resolves the mount by path, so
          # force-recreate caddy whenever the stack defines it. Certificates
          # live on the caddy_data volume and survive the recreate.
          if docker compose -f "$COMPOSE_FILE" ps --services | grep -qx caddy; then
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate caddy
          fi
          EOF

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'docker-compose.yml' }}
        run: |
          ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
              -i ~/.ssh/id_deploy -p "$SSH_PORT" \
              "$SSH_USER@$SSH_HOST" bash -s <<EOF
          set -euo pipefail
          cd "$DEPLOY_PATH"
          # Query the backend from inside its container: works for both the
          # domain and IP-only stacks (backend listens on :8000 internally).
          for i in \$(seq 1 30); do
            if docker compose -f "$COMPOSE_FILE" exec -T backend \
                 python -c "import urllib.request,sys; sys.exit(0 if b'ok' in urllib.request.urlopen('http://localhost:8000/health', timeout=5).read() else 1)"; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Waiting for backend (\$i/30)..."
            sleep 5
          done
          echo "Health check failed after 150s" >&2
          exit 1
          EOF

  # ---------------------------------------------------------------------------
  # Deploy: Proxmox LXC behind shiftplanner.truhn.ai, reached through the
  # bastion (ForceCommand allows TCP forwarding only, so the bastion is a pure
  # proxy jump and the script runs on the container itself). First run
  # bootstraps /opt/app: clone (public repo, no credentials needed on the
  # box), generate .env secrets locally WITHOUT echoing them, install the
  # /opt/app/run.sh autostart convention. The stack binds 127.0.0.1:5000 only;
  # the container's own nginx terminates TLS for the domain.
  # ---------------------------------------------------------------------------
  deploy-truhn:
    name: Deploy (Bastion -> shiftplanner.truhn.ai)
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap + deploy on the LXC container
        uses: appleboy/ssh-action@v1
        with:
          host: 10.10.10.6
          username: root
          key: ${{ secrets.SSH_KEY_FUER_SHIFTSCHEDULE_SERVER }}
          proxy_host: 49.13.89.75
          proxy_port: 4444
          proxy_username: dtruhn
          proxy_key: ${{ secrets.SSH_KEY_FUER_SHIFTSCHEDULE_SERVER }}
          # First build compiles the Playwright-enabled backend image — allow
          # well beyond the action's 10m default.
          command_timeout: 40m
          script: |
            set -euo pipefail

            # First run: clone the (public) repo; afterwards: hard sync.
            if [ ! -d /opt/app/.git ]; then
              rm -rf /opt/app
              git clone https://github.com/Wunderwerk-Official/ShiftSchedule.git /opt/app
            fi
            cd /opt/app
            git fetch origin main
            git reset --hard origin/main

            # One-time .env bootstrap with locally generated secrets. Nothing
            # is echoed to the workflow log; read the admin password later via
            # SSH: sudo cat /opt/app/.env
            if [ ! -f .env ]; then
              umask 177
              {
                echo "DOMAIN=shiftplanner.truhn.ai"
                echo "ADMIN_USERNAME=admin"
                echo "ADMIN_PASSWORD=$(openssl rand -hex 8)"
                echo "JWT_SECRET=$(openssl rand -hex 32)"
                echo "JWT_EXPIRE_MINUTES=720"
                echo "ANTHROPIC_API_KEY="
              } > .env
              umask 022
              echo "Bootstrapped new /opt/app/.env (secrets not shown)."
            fi

            # Autostart convention: app.service keeps /opt/app/run.sh running.
            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'set -e' \
              'cd /opt/app' \
              'docker compose -f docker-compose.proxied.yml up -d' \
              'exec sleep infinity' \
              > run.sh
            chmod +x run.sh

            # The host nginx (TLS for the domain) fronts the container stack.
            # Its defaults cut idle proxied requests after 60s and buffer SSE
            # — both break long solver runs. Fallback directives at http level
            # via conf.d drop-in (site/location settings still win if set).
            if [ -d /etc/nginx/conf.d ]; then
              printf '%s\n' \
                '# ShiftSchedule: solver POSTs idle for minutes, progress is SSE.' \
                'proxy_read_timeout 3600s;' \
                'proxy_send_timeout 3600s;' \
                'proxy_buffering off;' \
                > /etc/nginx/conf.d/zz-shiftschedule-proxy.conf
              if nginx -t >/dev/null 2>&1; then
                systemctl reload nginx 2>/dev/null || nginx -s reload
                if nginx -T 2>/dev/null | grep -q zz-shiftschedule-proxy; then
                  echo "Host nginx proxy drop-in active."
                else
                  echo "WARNING: host nginx does not include conf.d — add proxy timeouts manually."
                fi
              else
                rm -f /etc/nginx/conf.d/zz-shiftschedule-proxy.conf
                echo "WARNING: host nginx config test failed with the drop-in; removed it again."
              fi
            fi

            # Never replace the container mid-solve: hold the deploy (up to
            # 90 min — runs have no wall-clock limit, only the iteration
            # budget) while a solver subprocess (multiprocessing spawn_main)
            # is alive in the backend container. Works regardless of the
            # deployed app version; a container that is down passes through.
            for i in $(seq 1 540); do
              if docker compose -f docker-compose.proxied.yml exec -T backend \
                   python -c "import glob;print(sum('spawn_main' in open(f,'rb').read().decode('utf-8','ignore') for f in glob.glob('/proc/[0-9]*/cmdline')))" 2>/dev/null \
                 | grep -q '^[1-9]'; then
                echo "Solver run in flight - postponing deploy ($i/540)..."
                sleep 10
              else
                break
              fi
            done

            docker compose -f docker-compose.proxied.yml up -d --build

            # Health check through the exact path the host nginx uses.
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:5000/api/health >/dev/null 2>&1; then
                echo "Backend healthy behind 127.0.0.1:5000"
                exit 0
              fi
              echo "Waiting for backend ($i/30)..."
              sleep 5
            done
            echo "Health check failed after 150s" >&2
            docker compose -f docker-compose.proxied.yml ps
            docker compose -f docker-compose.proxied.yml logs --tail 50 backend
            exit 1

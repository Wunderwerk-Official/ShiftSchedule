server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # The SPA shell must never be served stale: without an explicit header,
  # browsers apply heuristic caching to index.html and keep loading the
  # previous bundle after a deploy until a hard refresh.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Vite emits content-hashed asset filenames - safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri /index.html;
  }

  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Solver runs answer only after minutes of work and stream SSE progress
    # in between — nginx defaults (60s read timeout, buffering on) cut the
    # solve POST mid-run and freeze the live activity feed.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }
}

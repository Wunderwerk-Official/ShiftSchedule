services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SCHEDULE_DB_PATH: /data/schedule.db
      CORS_ALLOW_ORIGINS: ${APP_ORIGIN}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      FRONTEND_BASE_URL: ${APP_ORIGIN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_RESET: ${ADMIN_PASSWORD_RESET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      # Agent solver (optional; only needed for solver_mode="agent").
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_PROVIDER: ${AGENT_PROVIDER:-anthropic}
      AGENT_MODEL: ${AGENT_MODEL:-claude-opus-4-8}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-20}
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend_data:

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SCHEDULE_DB_PATH: /data/schedule.db
      CORS_ALLOW_ORIGINS: https://${DOMAIN}
      # External base URL used to build public iCal subscription links (backend is reachable via /api).
      PUBLIC_BASE_URL: https://${DOMAIN}/api
      # Frontend base URL used for PDF rendering (Playwright).
      FRONTEND_BASE_URL: https://${DOMAIN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Set to "true" (plus a new ADMIN_PASSWORD) to reset an existing admin
      # user's password on the next container start; remove afterwards.
      ADMIN_PASSWORD_RESET: ${ADMIN_PASSWORD_RESET:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      # Agent solver (optional; only needed for solver_mode="agent").
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_PROVIDER: ${AGENT_PROVIDER:-anthropic}
      AGENT_MODEL: ${AGENT_MODEL:-claude-sonnet-5}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-1000}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_VERIFY_TLS: ${OPENAI_VERIFY_TLS:-true}
    volumes:
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped

  caddy:
    image: caddy:2.8.4
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  backend_data:
  caddy_data:
  caddy_config:
